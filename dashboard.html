<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>پنل مدیریت</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{

background:#050505;
color:white;

}

.header{

height:75px;

background:#111;

border-bottom:2px solid #d4af37;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 25px;

}

.logo{

font-size:24px;

font-weight:bold;

color:#d4af37;

}

.logout{

background:#b30000;

color:white;

border:none;

padding:10px 18px;

border-radius:10px;

cursor:pointer;

}

.container{

width:95%;

max-width:1300px;

margin:30px auto;

}

.card{

background:#111;

border:1px solid #333;

border-radius:20px;

padding:25px;

box-shadow:0 0 20px rgba(212,175,55,.15);

margin-bottom:25px;

}

.title{

font-size:22px;

color:#d4af37;

margin-bottom:20px;

}

input{

width:100%;

padding:14px;

background:#1b1b1b;

border:1px solid #444;

color:white;

border-radius:10px;

margin-bottom:15px;

outline:none;

}

input:focus{

border-color:#d4af37;

}

button{

border:none;

cursor:pointer;

padding:13px 20px;

border-radius:10px;

font-size:15px;

}

.add{

background:#d4af37;

color:black;

font-weight:bold;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

thead{

background:#d4af37;

color:black;

}

th{

padding:15px;

}

td{

padding:14px;

border-bottom:1px solid #333;

text-align:center;

}

.edit{

background:#2563eb;

color:white;

}

.delete{

background:#dc2626;

color:white;

}

tr:hover{

background:#181818;

}

</style>

</head>

<body>

<script>

if(localStorage.getItem("admin")!="true"){

location.href="admin.html";

}

</script>

<div class="header">

<div class="logo">

🚗 پنل مدیریت لیست قیمت

</div>

<button class="logout" onclick="logout()">

خروج

</button>

</div>

<div class="container">

<div class="card">

<div class="title">

افزودن کالا

</div>

<input id="code" placeholder="کد کالا">

<input id="name" placeholder="نام کالا">

<input id="price" placeholder="قیمت">

<button class="add">

افزودن کالا

</button>

</div>

<div class="card">

<div class="title">

لیست کالاها

</div>

<input id="search" placeholder="جستجو...">

<table>

<thead>

<tr>

<th>کد</th>

<th>نام کالا</th>

<th>قیمت</th>

<th>عملیات</th>

</tr>

</thead>

<tbody id="table">

</tbody>

</table>

</div>

</div>
<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

const table = document.getElementById("table");

const code = document.getElementById("code");

const name = document.getElementById("name");

const price = document.getElementById("price");

const search = document.getElementById("search");

const addBtn = document.querySelector(".add");



function save(){

localStorage.setItem("products",JSON.stringify(products));

}



function show(data=products){

table.innerHTML="";

data.forEach((item,index)=>{

table.innerHTML += `

<tr>

<td>${item.code}</td>

<td>${item.name}</td>

<td>${item.price}</td>

<td>

<button class="edit" onclick="editProduct(${index})">

ویرایش

</button>

<button class="delete" onclick="deleteProduct(${index})">

حذف

</button>

</td>

</tr>

`;

});

}



addBtn.onclick=function(){

if(

code.value=="" ||

name.value=="" ||

price.value==""

){

alert("تمام فیلدها را پر کنید");

return;

}



products.push({

code:code.value,

name:name.value,

price:price.value

});



save();

show();



code.value="";

name.value="";

price.value="";



}



function deleteProduct(index){

if(confirm("حذف شود؟")){

products.splice(index,1);

save();

show();

}

}



function editProduct(index){

let c=prompt("کد کالا",products[index].code);

if(c===null)return;

let n=prompt("نام کالا",products[index].name);

if(n===null)return;

let p=prompt("قیمت",products[index].price);

if(p===null)return;



products[index]={

code:c,

name:n,

price:p

};



save();

show();

}



search.addEventListener("input",()=>{

let value=search.value.trim();

let result=products.filter(item=>

item.code.includes(value) ||

item.name.includes(value)

);

show(result);

});



function logout(){

localStorage.removeItem("admin");

location.href="admin.html";

}



show();

</script>

</body>

</html>
