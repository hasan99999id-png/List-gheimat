<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورود مدیر</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{

background:#050505;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.box{

width:360px;
background:#111;
padding:35px;
border-radius:22px;
border:2px solid #d4af37;
box-shadow:0 0 40px rgba(212,175,55,.25);

}

.logo{

font-size:65px;
text-align:center;
margin-bottom:10px;

}

h2{

text-align:center;
color:#d4af37;
margin-bottom:8px;

}

p{

text-align:center;
color:#999;
margin-bottom:25px;

}

input{

width:100%;
padding:15px;
border-radius:12px;
border:1px solid #444;
background:#1b1b1b;
color:white;
font-size:16px;
outline:none;
margin-bottom:18px;
transition:.3s;

}

input:focus{

border-color:#d4af37;
box-shadow:0 0 12px rgba(212,175,55,.4);

}

button{

width:100%;
padding:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:17px;
font-weight:bold;

background:linear-gradient(135deg,#b8860b,#ffd700);

color:black;

transition:.3s;

}

button:hover{

transform:scale(1.03);

box-shadow:0 0 20px rgba(255,215,0,.45);

}

.footer{

margin-top:20px;
text-align:center;
color:#666;
font-size:13px;

}

</style>

</head>

<body>

<div class="box">

<div class="logo">
🚗
</div>

<h2>پنل مدیریت</h2>

<p>لیست قیمت قطعات خودرو</p>

<input
id="password"
type="password"
placeholder="رمز عبور">

<button onclick="login()">

ورود

</button>

<div class="footer">

VPart Admin Panel

</div>

</div>

<script>

const PASSWORD="123456";

function login(){

const pass=document.getElementById("password").value;

if(pass===PASSWORD){

localStorage.setItem("admin","true");

window.location.href="dashboard.html";

}else{

alert("رمز عبور اشتباه است");

}

}

</script>

</body>

</html>
