<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لیست قیمت قطعات خودرو</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}


body{

background:#f1f5f9;
padding:20px;

}



.container{

max-width:1150px;
margin:auto;

}



/* هدر */

.header{

background:linear-gradient(135deg,#0284c7,#38bdf8);
color:white;
padding:35px;
border-radius:25px;
text-align:center;
margin-bottom:25px;
box-shadow:0 15px 35px rgba(2,132,199,.25);

}


.header h1{

font-size:30px;
margin-bottom:10px;

}


.header p{

opacity:.9;

}



/* تعداد */

.counter{

background:white;
border-radius:18px;
padding:15px;
margin-bottom:20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
color:#0284c7;
font-weight:bold;

}



#count{

font-size:25px;

}



/* سرچ */

.search-box{

background:white;
padding:15px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}


.search{

width:100%;
padding:15px;
border:none;
outline:none;
background:#f8fafc;
border-radius:15px;
font-size:16px;

}



/* جدول */

.table-box{

background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,.08);

}


.table-scroll{

overflow-x:auto;

}


table{

width:100%;
border-collapse:collapse;
min-width:650px;

}



thead{

background:#0284c7;
color:white;

}


th{

padding:18px;
font-size:16px;

}



td{

padding:15px;
text-align:center;
border-bottom:1px solid #e5e7eb;
color:#334155;
vertical-align:middle;

}



tr:hover{

background:#f0f9ff;

}



/* ستون ها */

.code{

color:#0284c7;
font-weight:800;

}



.name{

max-width:380px;
white-space:normal;
overflow-wrap:anywhere;
line-height:1.9;

}



.price{

color:#16a34a;
font-weight:800;
white-space:nowrap;

}



/* خالی */

.empty{

display:none;
padding:40px;
text-align:center;
color:#64748b;

}



/* موبایل */

@media(max-width:700px){


body{

padding:10px;

}


.header{

padding:25px 15px;

}


.header h1{

font-size:22px;

}


th,td{

padding:12px 8px;

}


.name{

max-width:220px;

}


}


</style>

</head>


<body>


<div class="container">



<div class="header">

<h1>🚗 لیست قیمت قطعات خودرو</h1>

<p>
جستجو و مشاهده قیمت قطعات
</p>

</div>




<div class="counter">

تعداد کل قطعات:

<div id="count">
0
</div>

</div>




<div class="search-box">

<input
class="search"
id="search"
placeholder="🔍 جستجوی نام کالا یا کد کالا..."
>

</div>





<div class="table-box">

<div class="table-scroll">


<table>


<thead>

<tr>

<th>کد کالا</th>

<th>عنوان کالا</th>

<th>قیمت</th>

</tr>

</thead>


<tbody id="list">

</tbody>


</table>


</div>



<div id="empty" class="empty">

کالایی پیدا نشد

</div>


</div>


</div>





<script>


const list=document.getElementById("list");
const search=document.getElementById("search");
const empty=document.getElementById("empty");
const count=document.getElementById("count");


let products=[];



fetch("https://docs.google.com/spreadsheets/d/1OImD12FCHFiDxzN-h8lBWox2gM2jCmaAntPI_NjfWsg/gviz/tq?tqx=out:json")


.then(res=>res.text())


.then(text=>{


const json=JSON.parse(text.substring(47).slice(0,-2));


products=json.table.rows.map(row=>{


return {

code:row.c[0]?.v?.toString() || "",

name:row.c[1]?.v?.toString() || "",

price:row.c[2]?.v?.toString() || ""

};


});



count.innerHTML=products.length.toLocaleString("fa-IR");


show(products);


})

.catch(error=>{

console.log(error);

});





function formatPrice(price){


let num=price.replace(/,/g,"");


if(!isNaN(num) && num!==""){

return Number(num).toLocaleString("fa-IR")+" تومان";

}


return price;


}





function show(data){


let html="";



if(data.length===0){

list.innerHTML="";

empty.style.display="block";

return;

}


empty.style.display="none";



data.forEach(item=>{


html+=`

<tr>

<td class="code">

${item.code}

</td>


<td class="name">

${item.name}

</td>


<td class="price">

${formatPrice(item.price)}

</td>


</tr>

`;


});



list.innerHTML=html;


}




search.addEventListener("input",()=>{


let value=search.value.trim();


let result=products.filter(item=>


item.name.includes(value) ||

item.code.includes(value)


);



show(result);


});



</script>



</body>

</html>
