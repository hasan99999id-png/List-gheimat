<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لیست قیمت قطعات خودرو</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}


body{

background:#f1f5f9;
padding:20px;

}



.container{

max-width:1150px;
margin:auto;

}




.header{

background:linear-gradient(135deg,#0284c7,#38bdf8);

color:white;

padding:35px;

border-radius:25px;

text-align:center;

margin-bottom:20px;

box-shadow:0 15px 35px rgba(2,132,199,.25);

}



.header h1{

font-size:30px;

margin-bottom:10px;

}



.header p{

opacity:.9;

}





.search-box{

background:white;

padding:15px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,.08);

margin-bottom:10px;

}



.search{

width:100%;

padding:15px;

border:none;

outline:none;

background:#f8fafc;

border-radius:15px;

font-size:16px;

}





.pdf-area{

text-align:left;

margin-bottom:20px;

}



.pdf-btn{

background:#0284c7;

color:white;

border:none;

padding:7px 14px;

border-radius:10px;

font-size:13px;

cursor:pointer;

}



.pdf-btn:hover{

background:#0369a1;

}





.table-box{

background:white;

border-radius:25px;

padding:15px;

box-shadow:0 10px 35px rgba(0,0,0,.08);

}



table{

width:100%;

border-collapse:collapse;

}



thead{

background:#0284c7;

color:white;

}



th{

padding:16px;

}



td{

padding:15px;

text-align:center;

border-bottom:1px solid #e5e7eb;

color:#334155;

vertical-align:middle;

}



.code{

color:#0284c7;

font-weight:800;

}



.name{

line-height:1.9;

overflow-wrap:anywhere;

}



.price{

color:#16a34a;

font-weight:800;

white-space:nowrap;

}




.cards{

display:none;

}




.product-card{

background:white;

padding:18px;

border-radius:18px;

margin-bottom:15px;

box-shadow:0 5px 20px rgba(0,0,0,.08);

}



.card-code{

color:#0284c7;

font-weight:bold;

}



.card-name{

margin:15px 0;

line-height:2;

color:#334155;

}



.card-price{

color:#16a34a;

font-size:18px;

font-weight:800;

}





.empty{

display:none;

text-align:center;

padding:40px;

color:#64748b;

}




@media(max-width:700px){


body{

padding:10px;

}



.header{

padding:25px 15px;

}



.header h1{

font-size:22px;

}



.table-box table{

display:none;

}



.cards{

display:block;

}



.pdf-area{

text-align:center;

}


}


</style>


</head>


<body>


<div class="container">



<div class="header">


<h1>

🚗 لیست قیمت قطعات خودرو

</h1>


<p>

جستجو و مشاهده قیمت قطعات

</p>


</div>





<div class="search-box">


<input

class="search"

id="search"

placeholder="🔍 جستجوی نام کالا یا کد کالا..."

>


</div>





<div class="pdf-area">


<button class="pdf-btn" onclick="savePDF()">

📄 ذخیره PDF

</button>


</div>





<div class="table-box" id="pdfContent">



<table>


<thead>

<tr>

<th>کد کالا</th>

<th>عنوان کالا</th>

<th>قیمت</th>

</tr>

</thead>


<tbody id="list">

</tbody>


</table>




<div class="cards" id="cards">

</div>



<div id="empty" class="empty">

کالایی پیدا نشد

</div>



</div>


</div>
<script>


const list = document.getElementById("list");
const cards = document.getElementById("cards");
const search = document.getElementById("search");
const empty = document.getElementById("empty");


let products = [];



// دریافت اطلاعات از Google Sheet

fetch("https://docs.google.com/spreadsheets/d/1OImD12FCHFiDxzN-h8lBWox2gM2jCmaAntPI_NjfWsg/gviz/tq?tqx=out:json")


.then(res => res.text())


.then(text => {


const json = JSON.parse(text.substring(47).slice(0,-2));



products = json.table.rows.map(row => {


return {

code: row.c[0]?.v?.toString() || "",

name: row.c[1]?.v?.toString() || "",

price: row.c[2]?.v?.toString() || ""

};


});



show(products);


})


.catch(error => {


console.log("خطا در دریافت اطلاعات:",error);


});






// تبدیل قیمت به ریال


function formatPrice(price){


let num = price.replace(/,/g,"");


if(!isNaN(num) && num !== ""){


return Number(num).toLocaleString("fa-IR") + " ریال";


}


return price + " ریال";


}







function show(data){


let tableHTML = "";

let cardHTML = "";



if(data.length === 0){


list.innerHTML="";

cards.innerHTML="";

empty.style.display="block";


return;

}



empty.style.display="none";





data.forEach(item => {



tableHTML += `


<tr>


<td class="code">

${item.code}

</td>



<td class="name">

${item.name}

</td>



<td class="price">

${formatPrice(item.price)}

</td>



</tr>


`;






cardHTML += `


<div class="product-card">


<div class="card-code">

کد کالا: ${item.code}

</div>



<div class="card-name">

${item.name}

</div>



<div class="card-price">

${formatPrice(item.price)}

</div>


</div>


`;



});



list.innerHTML = tableHTML;


cards.innerHTML = cardHTML;



}







// جستجو


search.addEventListener("input",()=>{


let value = search.value.trim();



let result = products.filter(item =>


item.name.includes(value) ||

item.code.includes(value)


);



show(result);



});







// ذخیره PDF


async function savePDF(){



const element = document.getElementById("pdfContent");



const canvas = await html2canvas(element,{

scale:2

});



const imgData = canvas.toDataURL("image/png");



const {jsPDF} = window.jspdf;



const pdf = new jsPDF("p","mm","a4");



const width = 190;


const height = canvas.height * width / canvas.width;



pdf.addImage(

imgData,

"PNG",

10,

10,

width,

height

);



pdf.save("لیست-قیمت-قطعات.pdf");



}







// رفرش خودکار هر یک دقیقه


setInterval(()=>{


location.reload();


},60000);



</script>



</body>

</html>
