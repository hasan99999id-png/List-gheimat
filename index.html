<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لیست قیمت قطعات خودرو</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Vazirmatn,sans-serif;
}


body{
background:#f1f5f9;
padding:20px;
}


.container{
max-width:1100px;
margin:auto;
}


/* هدر */

.header{

background:linear-gradient(135deg,#0284c7,#0ea5e9);
color:white;
padding:30px;
border-radius:20px;
text-align:center;
margin-bottom:25px;
box-shadow:0 10px 25px rgba(0,0,0,.15);

}


.header h1{

font-size:28px;
margin-bottom:10px;

}


.header p{

opacity:.9;

}



/* جستجو */


.search-box{

background:white;
padding:15px;
border-radius:18px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}


.search{

width:100%;
border:none;
outline:none;
font-size:17px;
padding:12px;
background:#f8fafc;
border-radius:12px;

}




/* جدول */


.table-box{

background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);

}


table{

width:100%;
border-collapse:collapse;

}


thead{

background:#0284c7;
color:white;

}


th{

padding:16px;
font-size:16px;

}



td{

padding:14px;
text-align:center;
border-bottom:1px solid #eee;
color:#334155;

}



tr:hover{

background:#f0f9ff;

}



.code{

font-weight:bold;
color:#0284c7;

}



.price{

color:#16a34a;
font-weight:bold;

}




.empty{

display:none;
text-align:center;
padding:40px;
color:#777;

}


/* موبایل */

@media(max-width:700px){

body{
padding:10px;
}


.header h1{

font-size:22px;

}


table{

font-size:13px;

}


th,td{

padding:10px 5px;

}

}

</style>

</head>
<body>

<div class="container">


<div class="header">

<h1>🚗 لیست قیمت قطعات خودرو</h1>

<p>
جستجو و مشاهده مشخصات قطعات
</p>

</div>



<div class="search-box">

<input 
class="search"
id="search"
placeholder="🔍 جستجوی نام کالا یا کد کالا..."
>

</div>




<div class="table-box">


<table>

<thead>

<tr>

<th>کد کالا</th>

<th>عنوان کالا</th>

<th>قیمت</th>

</tr>

</thead>



<tbody id="list">

</tbody>


</table>



<div id="empty" class="empty">

کالایی پیدا نشد

</div>


</div>


</div>
<script>

const list = document.getElementById("list");
const search = document.getElementById("search");
const empty = document.getElementById("empty");


let products = [];


// دریافت اطلاعات از Google Sheet

fetch("https://docs.google.com/spreadsheets/d/1OImD12FCHFiDxzN-h8lBWox2gM2jCmaAntPI_NjfWsg/gviz/tq?tqx=out:json")

.then(res => res.text())

.then(text => {


const json = JSON.parse(text.substring(47).slice(0,-2));


products = json.table.rows.map(row => {


return {

code: row.c[0]?.v?.toString() || "",

name: row.c[1]?.v?.toString() || "",

price: row.c[2]?.v?.toString() || ""

};


});


// نمایش اولیه

show(products);


})

.catch(error => {

console.log("خطا در دریافت اطلاعات:", error);

});






function show(data){


let html="";


if(data.length===0){

list.innerHTML="";

empty.style.display="block";

return;

}


empty.style.display="none";



data.forEach(item=>{


html += `


<tr>


<td class="code">
${item.code}
</td>


<td>
${item.name}
</td>


<td class="price">
${item.price}
</td>


</tr>


`;


});


list.innerHTML=html;


}







// جستجو

search.addEventListener("input",()=>{


let value = search.value.trim();



let result = products.filter(item =>


item.name.includes(value) ||

item.code.includes(value)


);



show(result);



});



</script>


</body>

</html>
